<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Property Invoicing</title>
  <link rel="icon" type="image/png" href="../logo.png?v=3">
  <!-- Import Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Mobile sidebar overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-title">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22ZM12 20C7.58172 20 4 16.4183 4 12C4 7.58172 7.58172 4 12 4C16.4183 4 20 7.58172 20 12C20 16.4183 16.4183 20 12 20Z" fill="currentColor"/>
          <circle cx="12" cy="12" r="4" fill="currentColor"/>
        </svg>
        Midday
      </div>
    </div>
    
    <nav class="sidebar-nav">
      <a href="../index.html#ba-projects" class="nav-item back-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <span>Portfolio</span>
      </a>
      <div class="nav-group">Menu</div>
      <a href="dashboard.html" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        <span>Dashboard</span>
      </a>
      <a href="rooms.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        <span>Rooms</span>
      </a>
      <a href="tenants.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        <span>Tenants</span>
      </a>
      <a href="index.html" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        <span>Invoices</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="header">
      <div class="header-left">
        <button class="mobile-nav-toggle" id="mobileNavToggle" aria-label="Toggle menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div class="search-bar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" placeholder="Find anything...">
        </div>
      </div>
      <div class="header-right">
         <div class="avatar"><span>DN</span></div>
      </div>
    </header>

    <div class="app-container">
      <div class="kpi-grid">
         <div class="kpi-card" style="grid-column: span 2;">
            <div class="kpi-label">Monthly Revenue</div>
            <h3 class="kpi-title" style="margin-top: 8px;">$592.00</h3>
            <div class="kpi-desc">Forecast for Jun 2026</div>
            <div style="margin-top: 32px; height: 120px; border-bottom: 1px dashed var(--border); position: relative;">
               <!-- Mock Chart Line -->
               <svg viewBox="0 0 400 100" style="width: 100%; height: 100%; overflow: visible;">
                  <path d="M 0 90 Q 50 90 100 85 T 200 40 T 300 10 T 400 15" fill="none" stroke="var(--primary)" stroke-width="2"/>
                  <circle cx="300" cy="10" r="4" fill="var(--primary)" />
                  <circle cx="200" cy="40" r="3" fill="var(--primary)" />
                  <circle cx="100" cy="85" r="3" fill="var(--primary)" />
                  <circle cx="0" cy="90" r="3" fill="var(--primary)" />
                  <line x1="300" y1="10" x2="300" y2="100" stroke="var(--border)" stroke-width="1" stroke-dasharray="4"/>
               </svg>
            </div>
         </div>
         <div class="kpi-card" style="grid-column: span 2;">
            <div class="kpi-label">Recent Activity</div>
            <div style="margin-top: 16px; display: flex; flex-direction: column; gap: 16px;">
               <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px;">
                  <div>
                     <div style="font-size: 13.5px; color: var(--text-main);">Sarah Jenkins paid INV-0002</div>
                     <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">Jun 15, 2026</div>
                  </div>
                  <div style="font-weight: 500; font-size: 13.5px;">+$320.00</div>
               </div>
               <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px;">
                  <div>
                     <div style="font-size: 13.5px; color: var(--text-main);">Invoice INV-0003 is overdue</div>
                     <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">Jun 02, 2026</div>
                  </div>
                  <div style="font-weight: 500; font-size: 13.5px; color: var(--status-overdue-text);">-$185.00</div>
               </div>
               <div style="display: flex; justify-content: space-between; align-items: center;">
                  <div>
                     <div style="font-size: 13.5px; color: var(--text-main);">Invoice INV-0001 created</div>
                     <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">May 17, 2026</div>
                  </div>
                  <div style="font-weight: 500; font-size: 13.5px; color: var(--text-muted);">Pending</div>
               </div>
            </div>
         </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
