<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Invoicing | BA Portfolio</title>
  <meta name="description" content="Property management dashboard with minimalist design.">
  <link rel="icon" type="image/png" href="../logo.png?v=3">
  <!-- Import Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Mobile sidebar overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-title">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22ZM12 20C7.58172 20 4 16.4183 4 12C4 7.58172 7.58172 4 12 4C16.4183 4 20 7.58172 20 12C20 16.4183 16.4183 20 12 20Z" fill="currentColor"/>
          <circle cx="12" cy="12" r="4" fill="currentColor"/>
        </svg>
        Midday
      </div>
    </div>
    
    <nav class="sidebar-nav">
      <a href="../index.html#ba-projects" class="nav-item back-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <span>Portfolio</span>
      </a>
      
      <div class="nav-group">Menu</div>
      
      <a href="#" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        <span>Dashboard</span>
      </a>
      <a href="#" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        <span>Rooms</span>
      </a>
      <a href="#" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        <span>Tenants</span>
      </a>
      <a href="#" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        <span>Invoices</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    
    <header class="header">
      <div class="header-left">
        <button class="mobile-nav-toggle" id="mobileNavToggle" aria-label="Toggle menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div class="search-bar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" placeholder="Find anything...">
        </div>
      </div>
      <div class="header-right">
         <div class="avatar">
           <span>DN</span>
         </div>
      </div>
    </header>

    <div class="app-container">
      
      <!-- KPI Grid -->
      <div class="kpi-grid">
         <div class="kpi-card">
            <h3 class="kpi-title" id="kpi-revenue-title">$0</h3>
            <div class="kpi-label">Open</div>
            <div class="kpi-desc">3 invoices</div>
         </div>
         <div class="kpi-card">
            <h3 class="kpi-title" id="kpi-overdue-title">$0</h3>
            <div class="kpi-label">Overdue</div>
            <div class="kpi-desc">No invoices</div>
         </div>
         <div class="kpi-card">
            <h3 class="kpi-title" id="kpi-paid-title">$0</h3>
            <div class="kpi-label">Paid</div>
            <div class="kpi-desc">No invoices</div>
         </div>
      </div>

      <!-- Data Table Section -->
      <div class="table-section">
         <div class="table-header">
            <div class="table-search">
               <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
               <input type="text" placeholder="Search invoices...">
            </div>
            <button class="btn-filter">
               <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
            </button>
         </div>
         
         <div class="table-responsive">
           <table class="data-table">
             <thead>
               <tr>
                 <th class="checkbox-col"><input type="checkbox"></th>
                 <th>Invoice no.</th>
                 <th>Status</th>
                 <th>Due date</th>
                 <th>Customer</th>
                 <th>Amount</th>
               </tr>
             </thead>
             <tbody id="invoiceTableBody">
               <!-- Injected by JS -->
             </tbody>
           </table>
         </div>
      </div>

    </div>
  </main>

  <!-- Slide-out Drawer -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="invoiceDrawer">
    <div class="drawer-header">
      <div class="drawer-actions-left">
         <button class="btn-icon" id="closeDrawerBtn">
           <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
         </button>
         <button class="btn-dropdown">
            Default <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
         </button>
      </div>
      <div class="drawer-actions-right">
         <button class="btn-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg></button>
         <button class="btn-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg></button>
         <div class="btn-group">
            <button class="btn-primary">Create & Send</button>
            <button class="btn-primary btn-primary-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg></button>
         </div>
      </div>
    </div>
    
    <div class="drawer-content" id="drawerContent">
       <!-- Injected by JS -->
    </div>
  </aside>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
